<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient for the shield/document shape -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    
    <!-- Accent gradient for the Markdown arrow -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    
    <!-- AI circuit glow -->
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0.8"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square (WordPress plugin icon style) -->
  <rect x="32" y="32" width="448" height="448" rx="64" ry="64" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Subtle grid pattern for tech feel -->
  <g opacity="0.06" stroke="#00d2ff" stroke-width="0.5">
    <line x1="32" y1="132" x2="480" y2="132"/>
    <line x1="32" y1="212" x2="480" y2="212"/>
    <line x1="32" y1="292" x2="480" y2="292"/>
    <line x1="32" y1="372" x2="480" y2="372"/>
    <line x1="132" y1="32" x2="132" y2="480"/>
    <line x1="212" y1="32" x2="212" y2="480"/>
    <line x1="292" y1="32" x2="292" y2="480"/>
    <line x1="372" y1="32" x2="372" y2="480"/>
  </g>

  <!-- AI circuit traces - decorative lines -->
  <g stroke="url(#circuitGrad)" stroke-width="1.5" fill="none" opacity="0.3">
    <!-- Top left circuit -->
    <path d="M80,120 L120,120 L120,90"/>
    <circle cx="120" cy="86" r="3" fill="#00d2ff"/>
    <circle cx="80" cy="120" r="2.5" fill="#7b2ff7"/>
    
    <!-- Top right circuit -->
    <path d="M432,120 L392,120 L392,90"/>
    <circle cx="392" cy="86" r="3" fill="#00d2ff"/>
    <circle cx="432" cy="120" r="2.5" fill="#7b2ff7"/>
    
    <!-- Bottom left circuit -->
    <path d="M80,392 L120,392 L120,422"/>
    <circle cx="120" cy="426" r="3" fill="#00d2ff"/>
    <circle cx="80" cy="392" r="2.5" fill="#7b2ff7"/>
    
    <!-- Bottom right circuit -->
    <path d="M432,392 L392,392 L392,422"/>
    <circle cx="392" cy="426" r="3" fill="#00d2ff"/>
    <circle cx="432" cy="392" r="2.5" fill="#7b2ff7"/>
  </g>

  <!-- Document/page shape behind the M -->
  <g filter="url(#softGlow)">
    <rect x="140" y="100" width="232" height="290" rx="12" ry="12" fill="none" stroke="#00d2ff" stroke-width="2" opacity="0.25"/>
    <!-- Document fold -->
    <path d="M330,100 L372,100 L372,142" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.15"/>
    
    <!-- Simulated text lines on the document -->
    <rect x="170" y="310" width="172" height="4" rx="2" fill="#ffffff" opacity="0.08"/>
    <rect x="170" y="325" width="140" height="4" rx="2" fill="#ffffff" opacity="0.06"/>
    <rect x="170" y="340" width="160" height="4" rx="2" fill="#ffffff" opacity="0.05"/>
    <rect x="170" y="355" width="100" height="4" rx="2" fill="#ffffff" opacity="0.04"/>
  </g>

  <!-- Central Markdown "M" with down arrow — the iconic Markdown symbol -->
  <g filter="url(#glow)">
    <!-- Outer rounded rect border for Markdown symbol -->
    <rect x="148" y="140" width="216" height="152" rx="16" ry="16" fill="none" stroke="url(#accentGrad)" stroke-width="3.5" opacity="0.9"/>
    
    <!-- The "M" glyph (Markdown style) -->
    <g fill="#ffffff">
      <!-- Left bar of M -->
      <rect x="178" y="172" width="16" height="88" rx="2"/>
      <!-- Left diagonal -->
      <polygon points="194,172 194,188 240,240 240,222"/>
      <!-- Right diagonal -->
      <polygon points="272,172 272,188 240,240 240,222"/>
      <!-- Right bar of M -->
      <rect x="272" y="172" width="16" height="88" rx="2"/>
    </g>
    
    <!-- Down arrow (↓) — Markdown's iconic symbol -->
    <g fill="#ffffff">
      <rect x="316" y="172" width="14" height="60" rx="2"/>
      <polygon points="323,248 340,228 306,228"/>
    </g>
  </g>

  <!-- AI "brain" nodes orbiting — representing AI agents -->
  <g filter="url(#softGlow)">
    <!-- Node 1 - top -->
    <circle cx="256" cy="78" r="10" fill="#00d2ff" opacity="0.85"/>
    <circle cx="256" cy="78" r="5" fill="#ffffff" opacity="0.9"/>
    
    <!-- Node 2 - right -->
    <circle cx="420" cy="256" r="10" fill="#3a7bd5" opacity="0.85"/>
    <circle cx="420" cy="256" r="5" fill="#ffffff" opacity="0.9"/>
    
    <!-- Node 3 - bottom -->
    <circle cx="256" cy="434" r="10" fill="#7b2ff7" opacity="0.85"/>
    <circle cx="256" cy="434" r="5" fill="#ffffff" opacity="0.9"/>
    
    <!-- Node 4 - left -->
    <circle cx="92" cy="256" r="10" fill="#00d2ff" opacity="0.85"/>
    <circle cx="92" cy="256" r="5" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <!-- Connection lines from nodes to center (AI network feel) -->
  <g stroke="url(#circuitGrad)" stroke-width="1" opacity="0.2" stroke-dasharray="4,6">
    <line x1="256" y1="88" x2="256" y2="140"/>
    <line x1="410" y1="256" x2="364" y2="256"/>
    <line x1="256" y1="424" x2="256" y2="390"/>
    <line x1="102" y1="256" x2="148" y2="256"/>
  </g>

  <!-- Small "AI" badge -->
  <g>
    <rect x="340" y="388" width="56" height="28" rx="14" fill="#7b2ff7" opacity="0.9"/>
    <text x="368" y="407" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-weight="700" font-size="15" fill="#ffffff" letter-spacing="1">AI</text>
  </g>

</svg>
