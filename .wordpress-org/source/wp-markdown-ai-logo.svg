<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#121a33"/>
      <stop offset="55%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <radialGradient id="haloGrad" cx="50%" cy="42%" r="52%">
      <stop offset="0%" style="stop-color:#1f7cff;stop-opacity:0.28"/>
      <stop offset="55%" style="stop-color:#00d2ff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10192e;stop-opacity:0.98"/>
      <stop offset="100%" style="stop-color:#152745;stop-opacity:0.98"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#4d7cff"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#040814" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="72" ry="72" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <rect x="32" y="32" width="448" height="448" rx="72" ry="72" fill="url(#haloGrad)"/>
  <rect x="52" y="52" width="408" height="408" rx="52" ry="52" fill="none" stroke="#7bdcff" stroke-opacity="0.12" stroke-width="2"/>

  <g opacity="0.12" stroke="url(#nodeGrad)" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M112,144 L160,144"/>
    <path d="M352,144 L400,144"/>
    <path d="M112,368 L160,368"/>
    <path d="M352,368 L400,368"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="134" fill="#00d2ff" opacity="0.08"/>
    <rect x="112" y="122" width="288" height="268" rx="34" ry="34" fill="url(#panelGrad)" stroke="url(#accentGrad)" stroke-width="5"/>
    <rect x="138" y="94" width="236" height="296" rx="22" ry="22" fill="none" stroke="#8be8ff" stroke-opacity="0.18" stroke-width="3"/>
    <path d="M318,94 L374,94 L374,150" fill="none" stroke="#8be8ff" stroke-opacity="0.14" stroke-width="3"/>
  </g>

  <g fill="#ffffff">
    <rect x="154" y="183" width="24" height="112" rx="4"/>
    <polygon points="178,183 178,210 239,286 239,252"/>
    <polygon points="286,183 286,210 239,286 239,252"/>
    <rect x="286" y="183" width="24" height="112" rx="4"/>
    <rect x="333" y="183" width="20" height="74" rx="4"/>
    <polygon points="343,286 367,255 319,255"/>
  </g>

  <g opacity="0.26" fill="#ffffff">
    <rect x="164" y="330" width="132" height="7" rx="3.5"/>
    <rect x="164" y="347" width="92" height="7" rx="3.5"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="256" cy="92" r="14" fill="url(#nodeGrad)"/>
    <circle cx="256" cy="92" r="6" fill="#ffffff" opacity="0.95"/>
    <circle cx="92" cy="256" r="14" fill="url(#nodeGrad)"/>
    <circle cx="92" cy="256" r="6" fill="#ffffff" opacity="0.95"/>
    <circle cx="420" cy="256" r="14" fill="url(#nodeGrad)"/>
    <circle cx="420" cy="256" r="6" fill="#ffffff" opacity="0.95"/>
    <circle cx="256" cy="420" r="14" fill="url(#nodeGrad)"/>
    <circle cx="256" cy="420" r="6" fill="#ffffff" opacity="0.95"/>
  </g>

  <g opacity="0.2" stroke="url(#nodeGrad)" stroke-width="2" stroke-dasharray="6,8" stroke-linecap="round">
    <line x1="256" y1="106" x2="256" y2="122"/>
    <line x1="106" y1="256" x2="112" y2="256"/>
    <line x1="400" y1="256" x2="406" y2="256"/>
    <line x1="256" y1="390" x2="256" y2="406"/>
  </g>
</svg>
