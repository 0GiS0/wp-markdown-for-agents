version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - "🧪 ci"
      - "🏷️ release"
    commit-message:
      prefix: "ci"
      include: scope

  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - "🧪 ci"
      - "📦 packaging"
    commit-message:
      prefix: "build"
      include: scope
