name: "🧪 CI"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  bash-quality:
    name: "🐚 Bash quality"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "🛠️ Install ShellCheck"
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: "🔎 Validate Bash syntax"
        run: |
          bash -n .devcontainer/post-start.sh
          bash -n install-git-hooks.sh
          bash -n package-plugin.sh
          bash -n .githooks/pre-commit

      - name: "🐚 Run ShellCheck"
        run: shellcheck .devcontainer/post-start.sh install-git-hooks.sh package-plugin.sh .githooks/pre-commit

  php-lint:
    name: "🐘 PHP ${{ matrix.php-version }} lint"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3']

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "⚙️ Set up PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: "🔎 Lint plugin PHP files"
        run: find . -name "*.php" -not -path "./.git/*" -print0 | xargs -0 -n1 php -l

  php-quality:
    name: "🧹 PHP quality & security rules"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "⚙️ Set up PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: "📦 Install PHP tooling"
        run: composer install --no-interaction --no-progress

      - name: "🧼 Run PHPCS"
        run: vendor/bin/phpcs --standard=phpcs.xml.dist

  package-plugin:
    name: "📦 Package plugin"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "🛠️ Build distributable ZIP"
        run: |
          chmod +x package-plugin.sh
          ./package-plugin.sh

      - name: "⬆️ Upload plugin artifact"
        uses: actions/upload-artifact@v7
        with:
          name: markdown-view-for-ai-agents-zip
          path: dist/markdown-view-for-ai-agents.zip
          if-no-files-found: error
